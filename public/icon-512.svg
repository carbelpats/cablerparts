<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cabler Parts">
  <!-- Cabler Parts mark (512 / crisp source for rasterizing icon-192 + icon-512).
       Glossy amber standard plate + white "C" gauge arc, teal needle, warm pivot.
       Self-contained copy of src/components/BrandLogo.jsx Mark geometry. -->
  <defs>
    <linearGradient id="cablerAmber512" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB264" />
      <stop offset="0.5" stop-color="#FF7A1A" />
      <stop offset="1" stop-color="#E85C00" />
    </linearGradient>
    <linearGradient id="cablerTeal512" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3BEAD3" />
      <stop offset="1" stop-color="#12B8A6" />
    </linearGradient>
    <radialGradient id="cablerGloss512" cx="0.32" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Standard plate — glossy app-icon tile (trust / authority). -->
  <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#cablerAmber512)" />
  <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#cablerGloss512)" />
  <rect x="3" y="3" width="42" height="42" rx="13" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.1" />

  <!-- Gauge bezel — subtle measured ring. -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />

  <!-- Tick marks (gauge dial). -->
  <g stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round">
    <path d="M24 8.5v2.4" />
    <path d="M13.4 12.9l1.7 1.7" />
    <path d="M8.6 23.6h2.4" />
    <path d="M13.4 34.3l1.7-1.7" />
  </g>

  <!-- The Cabler "C" — the lit gauge arc, open to the right. -->
  <path d="M33 13.4A13 13 0 1 0 33 34.6" fill="none" stroke="#ffffff" stroke-width="4.4" stroke-linecap="round" />

  <!-- Needle — swept up toward the redline (speed / performance). -->
  <path d="M24 24L30.5 15.2" fill="none" stroke="url(#cablerTeal512)" stroke-width="3.1" stroke-linecap="round" />

  <!-- Pivot — the warm, moving heart (human pulse). -->
  <circle cx="24" cy="24" r="3.1" fill="url(#cablerTeal512)" />
  <circle cx="24" cy="24" r="1.3" fill="#ffffff" />
</svg>
