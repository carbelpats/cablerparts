<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cabler Parts">
  <!-- Cabler Parts MASKABLE icon: full-bleed amber field to every edge (no rounded
       transparent corners) so platform masks crop safely. The "C" gauge is scaled
       into the maskable safe zone (centered ~62% of canvas). Self-contained copy of
       src/components/BrandLogo.jsx Mark geometry (no plate rect — the amber IS the bg). -->
  <defs>
    <linearGradient id="cablerAmberMask" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB264" />
      <stop offset="0.5" stop-color="#FF7A1A" />
      <stop offset="1" stop-color="#E85C00" />
    </linearGradient>
    <linearGradient id="cablerTealMask" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3BEAD3" />
      <stop offset="1" stop-color="#12B8A6" />
    </linearGradient>
    <radialGradient id="cablerGlossMask" cx="0.32" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Full-bleed amber background (edge to edge — maskable). -->
  <rect x="0" y="0" width="48" height="48" fill="url(#cablerAmberMask)" />
  <rect x="0" y="0" width="48" height="48" fill="url(#cablerGlossMask)" />

  <!-- Mark scaled to ~62% and centered in the maskable safe zone.
       Translate to keep center at (24,24): 24 - 24*0.62 = 9.12 -->
  <g transform="translate(9.12 9.12) scale(0.62)">
    <!-- Gauge bezel — subtle measured ring. -->
    <circle cx="24" cy="24" r="14" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />

    <!-- Tick marks (gauge dial). -->
    <g stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round">
      <path d="M24 8.5v2.4" />
      <path d="M13.4 12.9l1.7 1.7" />
      <path d="M8.6 23.6h2.4" />
      <path d="M13.4 34.3l1.7-1.7" />
    </g>

    <!-- The Cabler "C" — the lit gauge arc, open to the right. -->
    <path d="M33 13.4A13 13 0 1 0 33 34.6" fill="none" stroke="#ffffff" stroke-width="4.4" stroke-linecap="round" />

    <!-- Needle — swept up toward the redline (speed / performance). -->
    <path d="M24 24L30.5 15.2" fill="none" stroke="url(#cablerTealMask)" stroke-width="3.1" stroke-linecap="round" />

    <!-- Pivot — the warm, moving heart (human pulse). -->
    <circle cx="24" cy="24" r="3.1" fill="url(#cablerTealMask)" />
    <circle cx="24" cy="24" r="1.3" fill="#ffffff" />
  </g>
</svg>
